<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragon Speedrun Client</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="screen">
    <div class="game-shell">
      <canvas id="map"></canvas>
      <aside class="side-panel">
        <div class="panel-card">
          <div id="state-grid" class="state-grid"></div>
        </div>
      </aside>
      <canvas id="minimap" width="140" height="140"></canvas>
    </div>

    <div class="hud">
      <span id="status" class="status">Disconnected</span>
    </div>
    <div class="overlay" id="connect-overlay">
      <div class="card">
        <h1>Dragon Speedrun</h1>
        <label>
          Name
          <input id="player-name" type="text" placeholder="Your name" />
        </label>
        <button id="connect">Enter Queue</button>
        <p class="hint">You will be matched when a second player joins.</p>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>

</html>
