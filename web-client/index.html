<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragon Speedrun Client</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="screen">
    <div class="game-shell">
      <canvas id="map"></canvas>
      <aside class="side-panel">
        <div class="panel-card">
          <h2>Your Stats</h2>
          <div id="state-grid" class="state-grid"></div>
        </div>
        <div class="panel-card">
          <h2>World Map</h2>
          <canvas id="minimap" width="200" height="200"></canvas>
        </div>
      </aside>
    </div>

    <div class="hud">
      <span id="status" class="status">Disconnected</span>
      <div class="controls">
        <button data-move="Up">▲</button>
        <div class="mid-row">
          <button data-move="Left">◀</button>
          <button data-action="Attack">⚔</button>
          <button data-move="Right">▶</button>
        </div>
        <button data-move="Down">▼</button>
      </div>
    </div>
    <div class="overlay" id="connect-overlay">
      <div class="card">
        <h1>Dragon Speedrun</h1>
        <label>
          Server URL
          <input id="ws-url" type="text" value="ws://155.248.241.165:8080" />
        </label>
        <label>
          Name
          <input id="player-name" type="text" placeholder="Your name" />
        </label>
        <button id="connect">Enter Queue</button>
        <p class="hint">You will be matched when a second player joins.</p>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>

</html>
