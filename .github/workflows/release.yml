name: Build and Release Electron App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Sync app version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Using version $VERSION from tag $GITHUB_REF_NAME"
          node -e "const fs=require('fs'); const v=process.env.VERSION; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=v; fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\\n'); const lockPath='package-lock.json'; if(fs.existsSync(lockPath)){ const lock=JSON.parse(fs.readFileSync(lockPath,'utf8')); lock.version=v; if(lock.packages && lock.packages['']) lock.packages[''].version=v; fs.writeFileSync(lockPath, JSON.stringify(lock,null,2)+'\\n'); }" 
        env:
          VERSION: ${{ github.ref_name }}

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always
